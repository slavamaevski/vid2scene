<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DGS AutoLOD - WASM</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: #1a1a2e;
            color: #eee;
        }

        h1 {
            color: #00d4ff;
        }

        .container {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            margin: 1rem 0;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        input[type="number"] {
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid #444;
            background: #0f0f23;
            color: #fff;
            width: 200px;
        }

        button {
            padding: 1rem 2rem;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 1rem;
        }

        button:disabled {
            background: #444;
            color: #888;
        }

        #status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            background: #0f0f23;
            font-family: monospace;
            font-size: 0.85rem;
            height: 200px;
            max-height: 200px;
            overflow-y: scroll;
            overflow-x: hidden;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <h1>🎮 3DGS AutoLOD</h1>
    <p>Generate LOD versions of 3D Gaussian Splatting PLY files in your browser.</p>

    <div class="container">
        <h2>1. Select Input File</h2>
        <label class="file-label">
            📁 Choose PLY File
            <input type="file" id="fileInput" accept=".ply">
        </label>
        <p id="fileName" style="margin-top: 1rem; color: #888;">No file selected</p>
    </div>

    <div class="container">
        <h2>2. Settings</h2>
        <label>
            Target Gaussian Count:
            <input type="number" id="targetCount" value="100000" min="1000" step="1000">
        </label>
        <br><br>
        <label>
            <input type="checkbox" id="useBhattacharyya" checked>
            Use Bhattacharyya distance (better quality)
        </label>
    </div>

    <div class="container">
        <h2>3. Process</h2>
        <button id="processBtn" disabled>⚡ Generate LOD</button>
        <div id="status">Initializing WASM...</div>
    </div>

    <script src="./3dgs_autolod.js"></script>
    <script>
        let Module = null;
        let inputFile = null;

        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');

        let processingDone = false;  // Flag set when C++ prints "Done!"

        // Helper to append text to terminal
        // When text contains \r, only show the last segment (simulates CR behavior)
        function termPrint(text) {
            if (!text) return;

            // If text has \r, it's buffered progress - only show the final state
            if (text.includes('\r')) {
                const segments = text.split('\r');
                text = segments[segments.length - 1];  // Take last segment
            }

            const cleanText = text.replace(/[\n]/g, '').trim();
            if (!cleanText) return;

            const line = document.createElement('div');
            line.textContent = cleanText;
            status.appendChild(line);
            status.scrollTop = status.scrollHeight;
        }

        function clearTerminal() {
            status.innerHTML = '';
        }

        // Initialize WASM
        async function init() {
            try {
                Module = await AutoLOD({
                    print: function (text) {
                        console.log(text);
                        termPrint(text);
                        // Set done flag when we see the completion message
                        if (text.includes('Done!')) {
                            processingDone = true;
                        }
                    },
                    printErr: function (text) {
                        console.error(text);
                        termPrint(text);
                    }
                });
                termPrint('Ready! Select a PLY file.');
                console.log('WASM loaded');
            } catch (e) {
                termPrint('Error loading WASM: ' + e.message);
                console.error(e);
            }
        }

        // File selection
        fileInput.addEventListener('change', (e) => {
            inputFile = e.target.files[0];
            if (inputFile) {
                fileName.textContent = `Selected: ${inputFile.name} (${(inputFile.size / 1024 / 1024).toFixed(2)} MB)`;
                processBtn.disabled = !Module;
            }
        });

        // Process
        processBtn.addEventListener('click', async () => {
            if (!inputFile || !Module) return;

            processBtn.disabled = true;
            status.textContent = 'Reading file into WebAssembly filesystem...';

            try {
                const arrayBuffer = await inputFile.arrayBuffer();
                const inputData = new Uint8Array(arrayBuffer);

                const targetCount = parseInt(document.getElementById('targetCount').value);
                const useBhattacharyya = document.getElementById('useBhattacharyya').checked;

                // Write input to virtual filesystem
                Module.FS.writeFile('/input.ply', inputData);

                status.textContent = `Processing...)`;

                // Build arguments
                const args = ['/input.ply', '/output.ply', '-n', targetCount.toString()];
                if (!useBhattacharyya) args.push('--fast');

                const startTime = performance.now();
                console.log('Calling main...');
                processingDone = false;  // Reset flag
                Module.callMain(args);  // Don't await - returns immediately with PROXY_TO_PTHREAD
                console.log('Main started, waiting for completion...');

                // Wait for C++ to print "Done!"
                while (!processingDone) {
                    await new Promise(r => setTimeout(r, 100));
                }
                console.log('Processing complete!');

                // Now read the output file (guaranteed to be fully written)
                const outputData = Module.FS.readFile('/output.ply');

                const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);

                const blob = new Blob([outputData], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = inputFile.name.replace('.ply', `_lod${targetCount}.ply`);
                a.click();
                URL.revokeObjectURL(url);

                // Cleanup
                Module.FS.unlink('/input.ply');
                Module.FS.unlink('/output.ply');

                termPrint(`✅ Done in ${elapsed}s!`);
            } catch (e) {
                termPrint('❌ Error: ' + e.message);
                console.error(e);
            } finally {
                processBtn.disabled = false;
            }
        });

        init();
    </script>
</body>

</html>
